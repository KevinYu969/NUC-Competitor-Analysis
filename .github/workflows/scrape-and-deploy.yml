name: Scrape Customer Voice & Deploy

on:
  schedule:
    # Twice daily: 6:00 UTC and 18:00 UTC
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Brave Search scraper (with alerts & history)
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/brave_scraper.py

      - name: Run Google Trends scraper
        run: |
          pip install pytrends 2>/dev/null || true
          python scripts/trends_scraper.py || echo "Trends scraper skipped (pytrends not available)"

      - name: Sync docs/ with dashboard/
        run: |
          cp dashboard/data/*.json docs/data/ 2>/dev/null || true
          cp -r dashboard/data/history docs/data/history 2>/dev/null || true

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/ docs/data/
          git diff --staged --quiet || git commit -m "chore: update data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard --project-name=asus-nuc-competitor-analysis
